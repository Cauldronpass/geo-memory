<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Geo Memory</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f6fa; }
#app { display: flex; flex-direction: column; height: 100%; }

/* ── Header ─────────────────────────────────────────────────────── */
#header {
  background: #1a1f2e;
  color: #fff;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 10px;
}
#header-left { min-width: 0; }
#header-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
#count { font-size: 11px; color: #9aa3b8; margin-top: 1px; }

#mode-toggle {
  display: flex;
  background: rgba(255,255,255,0.12);
  border-radius: 8px;
  padding: 2px;
  flex-shrink: 0;
}
.mode-btn {
  padding: 5px 12px;
  border-radius: 6px;
  border: none;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  background: transparent;
  color: rgba(255,255,255,0.55);
  transition: all 0.15s;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.mode-btn.active { background: #fff; color: #1a1f2e; }

/* ── My Places UI ────────────────────────────────────────────────── */
#myplaces-ui { flex-shrink: 0; }

#search-row {
  padding: 8px 14px 4px;
  background: #fff;
  border-bottom: 1px solid #e8eaf0;
  position: relative;
}
#search-input {
  width: 100%;
  padding: 7px 12px;
  border-radius: 20px;
  border: 1.5px solid #d0d4df;
  font-size: 13px;
  outline: none;
  background: #f5f6fa;
  color: #222;
}
#search-input:focus { border-color: #1a1f2e; background: #fff; }

#filters {
  background: #fff;
  border-bottom: 1px solid #e8eaf0;
  padding: 8px 14px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.filter-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; flex-wrap: nowrap; }
.filter-row:last-child { margin-bottom: 0; }
.filter-label { font-size: 10px; font-weight: 700; color: #9aa3b8; letter-spacing: 0.6px; text-transform: uppercase; margin-right: 2px; white-space: nowrap; }
.status-btn { padding: 4px 11px; border-radius: 20px; border: 1.5px solid #d0d4df; background: #fff; color: #444; font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
.status-btn.active { background: #1a1f2e; color: #fff; border-color: #1a1f2e; }
.cat-chip { display: flex; align-items: center; gap: 5px; padding: 4px 10px 4px 8px; border-radius: 20px; border: 1.5px solid #e0e3ec; background: #fff; font-size: 12px; color: #444; cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
.cat-chip.off { opacity: 0.35; }
.cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Local search dropdown */
#search-results {
  position: absolute;
  left: 0; right: 0; top: 100%;
  background: #fff;
  border-radius: 0 0 12px 12px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.12);
  z-index: 500;
  max-height: 240px;
  overflow-y: auto;
  display: none;
}
.search-result-item { padding: 10px 16px; font-size: 13px; border-bottom: 1px solid #f0f2f7; cursor: pointer; display: flex; align-items: center; gap: 8px; }
.search-result-item:last-child { border-bottom: none; }
.search-result-item:active { background: #f5f6fa; }
.sri-name { font-weight: 600; color: #1a1f2e; }
.sri-meta { font-size: 11px; color: #9aa3b8; }

/* ── Discover UI ─────────────────────────────────────────────────── */
#discover-ui {
  display: none;
  flex-shrink: 0;
  background: #fff;
  border-bottom: 1px solid #e8eaf0;
  padding: 10px 14px 8px;
}
#discover-row { display: flex; gap: 8px; align-items: center; }
#discover-input {
  flex: 1;
  padding: 8px 14px;
  border-radius: 20px;
  border: 1.5px solid #d0d4df;
  font-size: 13px;
  outline: none;
  background: #f5f6fa;
  color: #222;
}
#discover-input:focus { border-color: #1a1f2e; background: #fff; }
#discover-btn {
  padding: 8px 16px;
  border-radius: 20px;
  background: #1a1f2e;
  color: #fff;
  border: none;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
#discover-btn:active { background: #2d3550; }
#discover-hint { font-size: 11px; color: #9aa3b8; margin-top: 5px; }

/* ── Map ─────────────────────────────────────────────────────────── */
#map { z-index: 0; flex-shrink: 0; }
#map.myplaces-mode { flex: 1; }
#map.discover-mode { height: 38vh; }

/* ── Discover results ────────────────────────────────────────────── */
#discover-results {
  display: none;
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.discover-card {
  display: flex;
  align-items: flex-start;
  gap: 11px;
  padding: 12px 16px;
  background: #fff;
  border-bottom: 1px solid #eef0f5;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.discover-card:active { background: #f7f8fc; }
.discover-card.matched { border-left: 3px solid #f5c518; }
.dc-dot-wrap { flex-shrink: 0; padding-top: 3px; }
.dc-dot { width: 11px; height: 11px; border-radius: 50%; }
.dc-body { flex: 1; min-width: 0; }
.dc-name { font-size: 14px; font-weight: 600; color: #1a1f2e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dc-addr { font-size: 11px; color: #9aa3b8; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dc-badge { display: inline-flex; align-items: center; gap: 3px; margin-top: 5px; padding: 2px 8px; border-radius: 10px; background: #fff8e1; color: #c48f00; font-size: 10px; font-weight: 700; }
.dc-right { flex-shrink: 0; text-align: right; padding-top: 1px; }
.dc-grating { font-size: 12px; font-weight: 600; color: #444; }
.dc-grating-lbl { font-size: 10px; color: #aaa; }

#discover-empty { padding: 48px 24px; text-align: center; color: #9aa3b8; font-size: 14px; line-height: 1.5; }
#discover-loading { padding: 36px; display: flex; justify-content: center; }

/* ── Detail panel ────────────────────────────────────────────────── */
#detail {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #fff;
  border-radius: 16px 16px 0 0;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.15);
  padding: 16px 18px 36px;
  transform: translateY(100%);
  transition: transform 0.25s ease;
  z-index: 1000;
  max-height: 62vh;
  overflow-y: auto;
}
#detail.open { transform: translateY(0); }
#detail-close {
  position: absolute;
  top: 12px; right: 14px;
  background: #f0f2f7;
  border: none;
  border-radius: 50%;
  width: 28px; height: 28px;
  font-size: 15px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #666;
  flex-shrink: 0;
}
#detail-name { font-size: 17px; font-weight: 700; color: #1a1f2e; margin-bottom: 3px; padding-right: 36px; line-height: 1.3; }
#detail-meta { font-size: 12px; color: #888; margin-bottom: 14px; }
.detail-row { display: flex; gap: 8px; margin-bottom: 6px; font-size: 13px; }
.detail-key { color: #9aa3b8; width: 84px; flex-shrink: 0; font-size: 12px; padding-top: 1px; }
.detail-val { color: #333; flex: 1; }
.pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.pill-visited { background: #e8f5e9; color: #2e7d32; }
.pill-want { background: #fff3e0; color: #e65100; }

/* "In your list" section inside discover detail */
.in-list-box {
  background: #fffbee;
  border: 1.5px solid #ffe082;
  border-radius: 10px;
  padding: 10px 12px;
  margin-bottom: 14px;
}
.in-list-label {
  font-size: 10px;
  font-weight: 700;
  color: #c48f00;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 7px;
}

.detail-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
.btn-action { padding: 9px 18px; border-radius: 9px; text-decoration: none; font-size: 13px; font-weight: 600; border: none; cursor: pointer; display: inline-block; -webkit-tap-highlight-color: transparent; }
.btn-primary { background: #1a1f2e; color: #fff; }
.btn-secondary { background: #f5f6fa; color: #1a1f2e; border: 1.5px solid #d0d4df; }

/* ── Loading overlay ─────────────────────────────────────────────── */
#loading {
  position: fixed; inset: 0;
  background: rgba(255,255,255,0.92);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 2000;
  gap: 12px;
  font-size: 14px; color: #666;
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid #e0e3ec;
  border-top-color: #1a1f2e;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (min-width: 600px) {
  #detail { max-width: 440px; left: auto; right: 20px; bottom: 20px; border-radius: 16px; }
}
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div id="header">
    <div id="header-left">
      <div id="header-title">Geo Memory</div>
      <div id="count">Loading…</div>
    </div>
    <div id="mode-toggle">
      <button class="mode-btn active" data-mode="myplaces" onclick="switchMode('myplaces')">My Places</button>
      <button class="mode-btn" data-mode="discover" onclick="switchMode('discover')">Discover</button>
    </div>
  </div>

  <!-- My Places controls -->
  <div id="myplaces-ui">
    <div id="search-row">
      <input id="search-input" type="search" placeholder="Search my places…" autocomplete="off" />
      <div id="search-results"></div>
    </div>
    <div id="filters">
      <div class="filter-row">
        <span class="filter-label">Status</span>
        <button class="status-btn active" data-status="all">All</button>
        <button class="status-btn" data-status="Visited">Visited</button>
        <button class="status-btn" data-status="Want to Visit">Want to Visit</button>
      </div>
      <div class="filter-row" id="cat-row">
        <span class="filter-label">Category</span>
      </div>
    </div>
  </div>

  <!-- Discover controls -->
  <div id="discover-ui">
    <div id="discover-row">
      <input id="discover-input" type="search" placeholder="e.g. ramen in Tokyo, bars in Chicago" autocomplete="off" />
      <button id="discover-btn" onclick="runDiscover()">Search</button>
    </div>
    <div id="discover-hint">Searches Google Places · places in your database are highlighted</div>
  </div>

  <!-- Map (shared) -->
  <div id="map" class="myplaces-mode"></div>

  <!-- Discover results list (below map) -->
  <div id="discover-results"></div>

</div><!-- #app -->

<!-- Detail panel (shared) -->
<div id="detail">
  <button id="detail-close" onclick="closeDetail()">✕</button>
  <div id="detail-name"></div>
  <div id="detail-meta"></div>
  <div id="detail-body"></div>
</div>

<!-- Initial loading screen -->
<div id="loading">
  <div class="spinner"></div>
  <div>Loading your places…</div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const GOOGLE_API_KEY = 'AIzaSyCEoi34yEEg9Ka7BtDJMJm9iRTM46CodN8';

const CATEGORY_COLORS = {
  'Restaurant': '#e05c3a',
  'Bar':        '#4a90d9',
  'Cafe':       '#e8a020',
  'Hotel':      '#3daa6e',
  'Shop':       '#e87030',
  'Attraction': '#2db08e',
  'Venue':      '#9b59b6',
  'Other':      '#909090',
};

// Maps Google Places primaryType → our category names
const GOOGLE_TYPE_MAP = {
  restaurant: 'Restaurant', food: 'Restaurant', meal_delivery: 'Restaurant',
  meal_takeaway: 'Restaurant', hamburger_restaurant: 'Restaurant',
  pizza_restaurant: 'Restaurant', seafood_restaurant: 'Restaurant',
  sushi_restaurant: 'Restaurant', steak_house: 'Restaurant',
  bar: 'Bar', night_club: 'Bar', cocktail_bar: 'Bar', wine_bar: 'Bar',
  pub: 'Bar', bar_and_grill: 'Bar',
  cafe: 'Cafe', coffee_shop: 'Cafe', bakery: 'Cafe',
  lodging: 'Hotel', hotel: 'Hotel', motel: 'Hotel', inn: 'Hotel',
  store: 'Shop', shopping_mall: 'Shop', clothing_store: 'Shop',
  tourist_attraction: 'Attraction', museum: 'Attraction',
  park: 'Attraction', amusement_park: 'Attraction', art_gallery: 'Attraction',
  event_venue: 'Venue', convention_center: 'Venue',
};

function googleTypeToCategory(primaryType) {
  return GOOGLE_TYPE_MAP[primaryType] || 'Other';
}

// ── State ─────────────────────────────────────────────────────────────────────
let allPlaces = [];
let myPlacesByGoogleId = new Map(); // google_place_id → place object
let myPlacesMarkers = [];
let discoverMarkers = [];
let currentMode = 'myplaces';
let activeStatus = 'all';
let activeCategories = new Set(Object.keys(CATEGORY_COLORS));

// Globals for discover result onclick (set by renderDiscoverResults)
let _discoverPlaces = [];
let _discoverMyPlaces = [];

// ── Map init ──────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([39.5, -95.0], 4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19,
}).addTo(map);
map.on('click', closeDetail);

// ── Load my places from nightly JSON ─────────────────────────────────────────
fetch('places.json')
  .then(r => r.json())
  .then(data => {
    allPlaces = data;
    for (const p of allPlaces) {
      if (p.google_place_id) myPlacesByGoogleId.set(p.google_place_id, p);
    }
    document.getElementById('loading').style.display = 'none';
    buildCategoryFilters();
    buildMyPlacesMarkers();
    applyFilters();
  })
  .catch(err => {
    document.getElementById('loading').innerHTML =
      `<div style="color:#c00;text-align:center;padding:24px">Failed to load places.<br><small>${err.message}</small></div>`;
  });

// ── My Places: category filter chips ─────────────────────────────────────────
function buildCategoryFilters() {
  const counts = {};
  for (const p of allPlaces) counts[p.category] = (counts[p.category] || 0) + 1;
  const row = document.getElementById('cat-row');
  for (const [cat, color] of Object.entries(CATEGORY_COLORS)) {
    if (!counts[cat]) continue;
    const chip = document.createElement('button');
    chip.className = 'cat-chip';
    chip.dataset.cat = cat;
    chip.innerHTML = `<span class="cat-dot" style="background:${color}"></span>${cat} <span style="color:#bbb;font-size:11px">(${counts[cat]})</span>`;
    chip.addEventListener('click', () => {
      if (activeCategories.has(cat)) activeCategories.delete(cat);
      else activeCategories.add(cat);
      chip.classList.toggle('off', !activeCategories.has(cat));
      applyFilters();
    });
    row.appendChild(chip);
  }
}

// ── My Places: map markers ────────────────────────────────────────────────────
function buildMyPlacesMarkers() {
  for (const p of allPlaces) {
    if (p.lat == null || p.lng == null) continue;
    const color = CATEGORY_COLORS[p.category] || '#909090';
    const visited = p.status === 'Visited';
    const m = L.circleMarker([p.lat, p.lng], {
      radius: 7,
      fillColor: color,
      color: '#fff',
      weight: 1.5,
      fillOpacity: visited ? 0.92 : 0.45,
      opacity: 1,
    });
    m.on('click', e => { L.DomEvent.stopPropagation(e); showMyPlaceDetail(p); });
    myPlacesMarkers.push({ marker: m, place: p });
  }
}

function applyFilters() {
  let shown = 0;
  for (const { marker, place } of myPlacesMarkers) {
    const ok = (activeStatus === 'all' || place.status === activeStatus) &&
               activeCategories.has(place.category);
    if (ok) { marker.addTo(map); shown++; } else { marker.remove(); }
  }
  const total = allPlaces.filter(p => p.lat != null).length;
  document.getElementById('count').textContent = `${shown} of ${total} places`;
}

// Status filter buttons
document.querySelectorAll('.status-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeStatus = btn.dataset.status;
    applyFilters();
  });
});

// ── My Places: local name search ──────────────────────────────────────────────
const searchInput = document.getElementById('search-input');
const searchResultsEl = document.getElementById('search-results');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  searchResultsEl.innerHTML = '';
  if (!q) { searchResultsEl.style.display = 'none'; return; }

  const matches = allPlaces
    .filter(p => p.name && p.name.toLowerCase().includes(q))
    .slice(0, 8);

  if (!matches.length) { searchResultsEl.style.display = 'none'; return; }

  for (const p of matches) {
    const div = document.createElement('div');
    div.className = 'search-result-item';
    div.innerHTML = `<span class="sri-name">${esc(p.name)}</span><span class="sri-meta">${esc([p.category, p.city].filter(Boolean).join(' · '))}</span>`;
    div.addEventListener('click', () => {
      searchResultsEl.style.display = 'none';
      searchInput.value = '';
      searchInput.blur();
      if (p.lat != null) map.setView([p.lat, p.lng], 14, { animate: true });
      showMyPlaceDetail(p);
    });
    searchResultsEl.appendChild(div);
  }
  searchResultsEl.style.display = 'block';
});
searchInput.addEventListener('blur', () => {
  setTimeout(() => { searchResultsEl.style.display = 'none'; }, 150);
});

// ── Mode switch ───────────────────────────────────────────────────────────────
function switchMode(mode) {
  currentMode = mode;
  closeDetail();

  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });

  const myUI = document.getElementById('myplaces-ui');
  const discoverUI = document.getElementById('discover-ui');
  const discoverResultsEl = document.getElementById('discover-results');
  const mapEl = document.getElementById('map');

  if (mode === 'myplaces') {
    myUI.style.display = '';
    discoverUI.style.display = 'none';
    discoverResultsEl.style.display = 'none';
    mapEl.className = 'myplaces-mode';
    clearDiscoverMarkers();
    applyFilters(); // restores my places markers
  } else {
    myUI.style.display = 'none';
    discoverUI.style.display = '';
    mapEl.className = 'discover-mode';
    // Hide my places markers while in discover mode
    for (const { marker } of myPlacesMarkers) marker.remove();
    document.getElementById('count').textContent = 'Google Places search';
    setTimeout(() => document.getElementById('discover-input').focus(), 100);
  }

  map.invalidateSize();
}

// ── Discover: Google Places search ───────────────────────────────────────────
async function runDiscover() {
  const query = document.getElementById('discover-input').value.trim();
  if (!query) return;
  document.getElementById('discover-input').blur();

  const resultsEl = document.getElementById('discover-results');
  resultsEl.style.display = 'block';
  resultsEl.innerHTML = '<div id="discover-loading"><div class="spinner"></div></div>';
  document.getElementById('count').textContent = 'Searching…';
  clearDiscoverMarkers();

  try {
    const resp = await fetch('https://places.googleapis.com/v1/places:searchText', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Goog-Api-Key': GOOGLE_API_KEY,
        'X-Goog-FieldMask': 'places.id,places.displayName,places.formattedAddress,places.location,places.rating,places.primaryType',
      },
      body: JSON.stringify({ textQuery: query, maxResultCount: 20 }),
    });

    if (!resp.ok) {
      const errData = await resp.json().catch(() => ({}));
      throw new Error(errData.error?.message || `API error ${resp.status}`);
    }

    const data = await resp.json();
    renderDiscoverResults(data.places || [], query);

  } catch (e) {
    resultsEl.innerHTML = `<div id="discover-empty">Search failed: ${esc(e.message)}<br><small style="color:#bbb">Check your connection and try again.</small></div>`;
    document.getElementById('count').textContent = 'Error';
  }
}

document.getElementById('discover-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') runDiscover();
});

// ── Discover: render result cards + map pins ──────────────────────────────────
function renderDiscoverResults(places, query) {
  const resultsEl = document.getElementById('discover-results');

  if (!places.length) {
    resultsEl.innerHTML = `<div id="discover-empty">No results for "<strong>${esc(query)}</strong>".<br>Try a different search.</div>`;
    document.getElementById('count').textContent = '0 results';
    return;
  }

  // Store for card onclick handlers
  _discoverPlaces = places;
  _discoverMyPlaces = places.map(gp => myPlacesByGoogleId.get(gp.id) || null);

  let matchCount = 0;
  const bounds = [];
  const matched = [];
  const unmatched = [];

  places.forEach((gp, i) => {
    const lat = gp.location?.latitude;
    const lng = gp.location?.longitude;
    const name = gp.displayName?.text || 'Unknown';
    const category = googleTypeToCategory(gp.primaryType);
    const color = CATEGORY_COLORS[category] || '#909090';
    const myPlace = _discoverMyPlaces[i];
    if (myPlace) matchCount++;

    // Map pin
    if (lat != null && lng != null) {
      bounds.push([lat, lng]);
      const pinColor = myPlace ? '#f5c518' : color;
      const m = L.circleMarker([lat, lng], {
        radius: myPlace ? 9 : 7,
        fillColor: pinColor,
        color: myPlace ? '#b8960a' : '#fff',
        weight: myPlace ? 2.5 : 1.5,
        fillOpacity: 0.88,
        opacity: 1,
      });
      m.on('click', e => { L.DomEvent.stopPropagation(e); showDiscoverDetail(i); });
      m.addTo(map);
      discoverMarkers.push(m);
    }

    // Card
    const card = {
      i,
      matched: !!myPlace,
      html: `
        <div class="discover-card${myPlace ? ' matched' : ''}" onclick="showDiscoverDetail(${i})">
          <div class="dc-dot-wrap">
            <div class="dc-dot" style="background:${myPlace ? '#f5c518' : color}"></div>
          </div>
          <div class="dc-body">
            <div class="dc-name">${esc(name)}</div>
            <div class="dc-addr">${esc(gp.formattedAddress || '')}</div>
            ${myPlace ? `<div class="dc-badge">★ In your list</div>` : ''}
          </div>
          <div class="dc-right">
            ${gp.rating ? `<div class="dc-grating">${gp.rating.toFixed(1)}</div><div class="dc-grating-lbl">Google</div>` : ''}
          </div>
        </div>`
    };
    if (myPlace) matched.push(card);
    else unmatched.push(card);
  });

  // Matched places appear first
  const allCards = [...matched, ...unmatched];
  resultsEl.innerHTML = allCards.map(c => c.html).join('');

  const matchLabel = matchCount > 0
    ? ` · <strong style="color:#c48f00">${matchCount} in your list</strong>`
    : '';
  document.getElementById('count').innerHTML = `${places.length} results${matchLabel}`;

  // Fit map to show all pins
  if (bounds.length) {
    map.fitBounds(bounds, { padding: [20, 20], maxZoom: 14, animate: true });
  }
}

function clearDiscoverMarkers() {
  for (const m of discoverMarkers) m.remove();
  discoverMarkers = [];
}

// ── Detail panel: My Places ───────────────────────────────────────────────────
function showMyPlaceDetail(p) {
  document.getElementById('detail-name').textContent = p.name;
  document.getElementById('detail-meta').textContent =
    [p.category, p.city, p.country].filter(Boolean).join(' · ');

  const statusClass = p.status === 'Visited' ? 'pill-visited' : 'pill-want';
  let html = '';

  html += `<div class="detail-row"><span class="detail-key">Status</span><span class="detail-val"><span class="pill ${statusClass}">${esc(p.status || '—')}</span></span></div>`;
  if (p.rating) {
    const stars = '★'.repeat(Math.round(p.rating)) + '☆'.repeat(5 - Math.round(p.rating));
    html += `<div class="detail-row"><span class="detail-key">My rating</span><span class="detail-val">${stars} ${p.rating}</span></div>`;
  }
  if (p.notes) {
    html += `<div class="detail-row"><span class="detail-key">Notes</span><span class="detail-val">${esc(p.notes)}</span></div>`;
  }
  if (p.tags && p.tags.length) {
    html += `<div class="detail-row"><span class="detail-key">Tags</span><span class="detail-val">${p.tags.map(esc).join(', ')}</span></div>`;
  }

  html += `<div class="detail-actions">`;
  if (p.lat != null) {
    html += `<a href="https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}&travelmode=driving" target="_blank" class="btn-action btn-primary">Directions</a>`;
  }
  if (p.notion_id) {
    html += `<a href="https://www.notion.so/${p.notion_id}" target="_blank" class="btn-action btn-secondary">Open in Notion</a>`;
  }
  html += `</div>`;

  document.getElementById('detail-body').innerHTML = html;
  document.getElementById('detail').classList.add('open');
}

// ── Detail panel: Discover result ─────────────────────────────────────────────
function showDiscoverDetail(i) {
  const gp = _discoverPlaces[i];
  const myPlace = _discoverMyPlaces[i];
  if (!gp) return;

  const name = gp.displayName?.text || 'Unknown';
  const category = googleTypeToCategory(gp.primaryType);
  const lat = gp.location?.latitude;
  const lng = gp.location?.longitude;

  document.getElementById('detail-name').textContent = name;
  document.getElementById('detail-meta').textContent = gp.formattedAddress || '';

  let html = '';

  // Google data row
  html += `<div class="detail-row"><span class="detail-key">Type</span><span class="detail-val">${esc(category)}</span></div>`;
  if (gp.rating) {
    const stars = '★'.repeat(Math.round(gp.rating)) + '☆'.repeat(5 - Math.round(gp.rating));
    html += `<div class="detail-row"><span class="detail-key">Google</span><span class="detail-val">${stars} ${gp.rating.toFixed(1)}</span></div>`;
  }

  // Personal overlay — only shown when this place is in your Notion database
  if (myPlace) {
    const statusClass = myPlace.status === 'Visited' ? 'pill-visited' : 'pill-want';
    html += `<div class="in-list-box" style="margin-top:12px">`;
    html += `<div class="in-list-label">★ In your list</div>`;
    html += `<div class="detail-row"><span class="detail-key">Status</span><span class="detail-val"><span class="pill ${statusClass}">${esc(myPlace.status || '—')}</span></span></div>`;
    if (myPlace.rating) {
      const stars = '★'.repeat(Math.round(myPlace.rating)) + '☆'.repeat(5 - Math.round(myPlace.rating));
      html += `<div class="detail-row"><span class="detail-key">My rating</span><span class="detail-val">${stars} ${myPlace.rating}</span></div>`;
    }
    if (myPlace.notes) {
      html += `<div class="detail-row"><span class="detail-key">Notes</span><span class="detail-val">${esc(myPlace.notes)}</span></div>`;
    }
    html += `</div>`;
  }

  // Action buttons
  html += `<div class="detail-actions">`;
  if (lat != null) {
    const dest = `${lat},${lng}`;
    html += `<a href="https://www.google.com/maps/dir/?api=1&destination=${dest}&destination_place_id=${esc(gp.id)}&travelmode=driving" target="_blank" class="btn-action btn-primary">Directions</a>`;
  }
  if (myPlace && myPlace.notion_id) {
    html += `<a href="https://www.notion.so/${myPlace.notion_id}" target="_blank" class="btn-action btn-secondary">Open in Notion</a>`;
  }
  html += `</div>`;

  document.getElementById('detail-body').innerHTML = html;
  document.getElementById('detail').classList.add('open');

  // Pan map to this pin
  if (lat != null && lng != null) {
    map.setView([lat, lng], 15, { animate: true });
  }
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function closeDetail() {
  document.getElementById('detail').classList.remove('open');
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
