<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Geo Memory</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f6fa; }
#app { display: flex; flex-direction: column; height: 100%; }

/* ── Header ─────────────────────────────────────────────────────── */
#header {
  background: #1a1f2e;
  color: #fff;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 10px;
}
#header-left { min-width: 0; }
#header-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
#count { font-size: 11px; color: #9aa3b8; margin-top: 1px; }

#mode-toggle {
  display: flex;
  background: rgba(255,255,255,0.12);
  border-radius: 8px;
  padding: 2px;
  flex-shrink: 0;
}
.mode-btn {
  padding: 5px 12px;
  border-radius: 6px;
  border: none;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  background: transparent;
  color: rgba(255,255,255,0.55);
  transition: all 0.15s;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.mode-btn.active { background: #fff; color: #1a1f2e; }

/* ── My Places UI ────────────────────────────────────────────────── */
#myplaces-ui { flex-shrink: 0; }

#search-row {
  padding: 8px 14px 4px;
  background: #fff;
  border-bottom: 1px solid #e8eaf0;
  position: relative;
}
#search-input {
  width: 100%;
  padding: 7px 12px;
  border-radius: 20px;
  border: 1.5px solid #d0d4df;
  font-size: 13px;
  outline: none;
  background: #f5f6fa;
  color: #222;
}
#search-input:focus { border-color: #1a1f2e; background: #fff; }

#filters {
  background: #fff;
  border-bottom: 1px solid #e8eaf0;
  padding: 8px 14px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.filter-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; flex-wrap: nowrap; }
.filter-row:last-child { margin-bottom: 0; }
.filter-label { font-size: 10px; font-weight: 700; color: #9aa3b8; letter-spacing: 0.6px; text-transform: uppercase; margin-right: 2px; white-space: nowrap; }
.status-btn { padding: 4px 11px; border-radius: 20px; border: 1.5px solid #d0d4df; background: #fff; color: #444; font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
.status-btn.active { background: #1a1f2e; color: #fff; border-color: #1a1f2e; }
.cat-chip { display: flex; align-items: center; gap: 5px; padding: 4px 10px 4px 8px; border-radius: 20px; border: 1.5px solid #e0e3ec; background: #fff; font-size: 12px; color: #444; cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
.cat-chip.off { opacity: 0.35; }
.cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Local search dropdown */
#search-results {
  position: absolute;
  left: 0; right: 0; top: 100%;
  background: #fff;
  border-radius: 0 0 12px 12px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.12);
  z-index: 500;
  max-height: 240px;
  overflow-y: auto;
  display: none;
}
.search-result-item { padding: 10px 16px; font-size: 13px; border-bottom: 1px solid #f0f2f7; cursor: pointer; display: flex; align-items: center; gap: 8px; }
.search-result-item:last-child { border-bottom: none; }
.search-result-item:active { background: #f5f6fa; }
.sri-name { font-weight: 600; color: #1a1f2e; }
.sri-meta { font-size: 11px; color: #9aa3b8; }

/* ── Discover UI ─────────────────────────────────────────────────── */
#discover-ui {
  display: none;
  flex-shrink: 0;
  background: #fff;
  border-bottom: 1px solid #e8eaf0;
  padding: 10px 14px 8px;
}
#discover-row { display: flex; gap: 8px; align-items: center; }
#discover-input {
  flex: 1;
  padding: 8px 14px;
  border-radius: 20px;
  border: 1.5px solid #d0d4df;
  font-size: 13px;
  outline: none;
  background: #f5f6fa;
  color: #222;
}
#discover-input:focus { border-color: #1a1f2e; background: #fff; }
#discover-btn {
  padding: 8px 16px;
  border-radius: 20px;
  background: #1a1f2e;
  color: #fff;
  border: none;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
#discover-btn:active { background: #2d3550; }
#discover-hint { font-size: 11px; color: #9aa3b8; margin-top: 5px; }

/* ── Map ─────────────────────────────────────────────────────────── */
#map { z-index: 0; flex: 1; }

/* ── Discover results — fixed bottom sheet ───────────────────────── */
#discover-results {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 42vh;
  background: #f5f6fa;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  z-index: 800;
  border-radius: 14px 14px 0 0;
  box-shadow: 0 -3px 16px rgba(0,0,0,0.12);
}
.discover-card {
  display: flex;
  align-items: flex-start;
  gap: 11px;
  padding: 12px 16px;
  background: #fff;
  border-bottom: 1px solid #eef0f5;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.discover-card:active { background: #f7f8fc; }
.discover-card.matched { border-left: 3px solid #f5c518; }
.dc-dot-wrap { flex-shrink: 0; padding-top: 3px; }
.dc-dot { width: 11px; height: 11px; border-radius: 50%; }
.dc-body { flex: 1; min-width: 0; }
.dc-name { font-size: 14px; font-weight: 600; color: #1a1f2e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dc-addr { font-size: 11px; color: #9aa3b8; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dc-badge { display: inline-flex; align-items: center; gap: 3px; margin-top: 5px; padding: 2px 8px; border-radius: 10px; background: #fff8e1; color: #c48f00; font-size: 10px; font-weight: 700; }
.dc-right { flex-shrink: 0; text-align: right; padding-top: 1px; }
.dc-grating { font-size: 12px; font-weight: 600; color: #444; }
.dc-grating-lbl { font-size: 10px; color: #aaa; }

#discover-empty { padding: 48px 24px; text-align: center; color: #9aa3b8; font-size: 14px; line-height: 1.5; }
#discover-loading { padding: 36px; display: flex; justify-content: center; }

/* ── Detail panel ────────────────────────────────────────────────── */
#detail {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #fff;
  border-radius: 16px 16px 0 0;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.15);
  padding: 16px 18px 36px;
  transform: translateY(100%);
  transition: transform 0.25s ease;
  z-index: 1000;
  max-height: 62vh;
  overflow-y: auto;
}
#detail.open { transform: translateY(0); }
#detail-close {
  position: absolute;
  top: 12px; right: 14px;
  background: #f0f2f7;
  border: none;
  border-radius: 50%;
  width: 28px; height: 28px;
  font-size: 15px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #666;
  flex-shrink: 0;
}
#detail-name { font-size: 17px; font-weight: 700; color: #1a1f2e; margin-bottom: 3px; padding-right: 36px; line-height: 1.3; }
#detail-meta { font-size: 12px; color: #888; margin-bottom: 14px; }
.detail-row { display: flex; gap: 8px; margin-bottom: 6px; font-size: 13px; }
.detail-key { color: #9aa3b8; width: 84px; flex-shrink: 0; font-size: 12px; padding-top: 1px; }
.detail-val { color: #333; flex: 1; }
.pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.pill-visited { background: #e8f5e9; color: #2e7d32; }
.pill-want { background: #fff3e0; color: #e65100; }

.in-list-box {
  background: #fffbee;
  border: 1.5px solid #ffe082;
  border-radius: 10px;
  padding: 10px 12px;
  margin-bottom: 14px;
}
.in-list-label {
  font-size: 10px;
  font-weight: 700;
  color: #c48f00;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 7px;
}

/* ── Detail tabs ─────────────────────────────────────────────────── */
.detail-tabs { display: flex; border-bottom: 1.5px solid #e8eaf0; margin-bottom: 14px; margin-top: 2px; }
.detail-tab { flex: 1; padding: 8px 0; font-size: 12px; font-weight: 600; text-align: center; color: #9aa3b8; border: none; background: none; cursor: pointer; border-bottom: 2.5px solid transparent; margin-bottom: -1.5px; -webkit-tap-highlight-color: transparent; transition: color 0.15s; }
.detail-tab.active { color: #1a1f2e; border-bottom-color: #1a1f2e; }
.detail-tab-panel { display: none; }
.detail-tab-panel.active { display: block; }
.detail-stub { padding: 24px 0; text-align: center; color: #b0b8cc; font-size: 13px; }

.detail-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
.btn-action { padding: 9px 18px; border-radius: 9px; text-decoration: none; font-size: 13px; font-weight: 600; border: none; cursor: pointer; display: inline-block; -webkit-tap-highlight-color: transparent; }
.btn-primary { background: #1a1f2e; color: #fff; }
.btn-secondary { background: #f5f6fa; color: #1a1f2e; border: 1.5px solid #d0d4df; }
.btn-save { background: #2e7d32; color: #fff; }
.btn-save:active { background: #1b5e20; }
.btn-checkin { background: #1565c0; color: #fff; }
.btn-checkin:active { background: #0d47a1; }

/* ── Save modal ──────────────────────────────────────────────────── */
#save-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1500;
  align-items: flex-end;
  justify-content: center;
}
#save-overlay.open { display: flex; }
#save-modal {
  background: #fff;
  border-radius: 20px 20px 0 0;
  padding: 20px 20px 40px;
  width: 100%;
  max-width: 500px;
  max-height: 90vh;
  overflow-y: auto;
}
#save-modal-title {
  font-size: 11px;
  font-weight: 700;
  color: #9aa3b8;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 4px;
}
#save-modal-name {
  font-size: 18px;
  font-weight: 700;
  color: #1a1f2e;
  margin-bottom: 2px;
  line-height: 1.3;
}
#save-modal-addr {
  font-size: 12px;
  color: #888;
  margin-bottom: 20px;
}
.save-field-label {
  font-size: 11px;
  font-weight: 700;
  color: #9aa3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
.status-picker {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}
.status-pick-btn {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: 2px solid #e0e3ec;
  background: #f5f6fa;
  font-size: 13px;
  font-weight: 600;
  color: #666;
  cursor: pointer;
  text-align: center;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.12s;
}
.status-pick-btn.active-want {
  border-color: #e65100;
  background: #fff3e0;
  color: #e65100;
}
.status-pick-btn.active-visited {
  border-color: #2e7d32;
  background: #e8f5e9;
  color: #2e7d32;
}
.save-textarea {
  width: 100%;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1.5px solid #d0d4df;
  font-size: 13px;
  font-family: inherit;
  color: #222;
  background: #f5f6fa;
  resize: none;
  outline: none;
  margin-bottom: 20px;
  min-height: 72px;
}
.save-textarea:focus { border-color: #1a1f2e; background: #fff; }
.save-input {
  width: 100%;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1.5px solid #d0d4df;
  font-size: 13px;
  font-family: inherit;
  color: #222;
  background: #f5f6fa;
  outline: none;
  margin-bottom: 20px;
}
.save-input:focus { border-color: #1a1f2e; background: #fff; }
.save-actions { display: flex; gap: 10px; }
#save-submit {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  background: #1a1f2e;
  color: #fff;
  border: none;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
#save-submit:disabled { background: #9aa3b8; cursor: default; }
#save-cancel {
  padding: 12px 18px;
  border-radius: 10px;
  background: #f5f6fa;
  color: #1a1f2e;
  border: 1.5px solid #d0d4df;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
#save-status-msg {
  font-size: 13px;
  text-align: center;
  margin-top: 12px;
  min-height: 18px;
}

/* ── Check-in modal ──────────────────────────────────────────────── */
#checkin-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1500;
  align-items: flex-end;
  justify-content: center;
}
#checkin-overlay.open { display: flex; }
#checkin-modal {
  background: #fff;
  border-radius: 20px 20px 0 0;
  padding: 20px 20px 40px;
  width: 100%;
  max-width: 500px;
  max-height: 90vh;
  overflow-y: auto;
}
#checkin-modal-title {
  font-size: 11px;
  font-weight: 700;
  color: #9aa3b8;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 4px;
}
#checkin-modal-name {
  font-size: 18px;
  font-weight: 700;
  color: #1a1f2e;
  margin-bottom: 18px;
  line-height: 1.3;
}
.occasion-picker {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.occasion-btn {
  padding: 7px 13px;
  border-radius: 20px;
  border: 2px solid #e0e3ec;
  background: #f5f6fa;
  font-size: 12px;
  font-weight: 600;
  color: #666;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.12s;
}
.occasion-btn.active { border-color: #1a1f2e; background: #1a1f2e; color: #fff; }
.sentiment-picker { display: flex; gap: 10px; margin-bottom: 20px; }
.sentiment-btn {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 2px solid #e0e3ec;
  background: #f5f6fa;
  font-size: 15px;
  font-weight: 600;
  color: #666;
  cursor: pointer;
  text-align: center;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.12s;
}
.sentiment-btn.active-good { border-color: #2e7d32; background: #e8f5e9; color: #2e7d32; }
.sentiment-btn.active-bad  { border-color: #c62828; background: #ffebee; color: #c62828; }
#checkin-submit {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  background: #1565c0;
  color: #fff;
  border: none;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
#checkin-submit:disabled { background: #9aa3b8; cursor: default; }
#checkin-cancel {
  padding: 12px 18px;
  border-radius: 10px;
  background: #f5f6fa;
  color: #1a1f2e;
  border: 1.5px solid #d0d4df;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
#checkin-status-msg { font-size: 13px; text-align: center; margin-top: 12px; min-height: 18px; }
.visit-line { font-size: 12px; color: #3daa6e; font-weight: 600; margin-bottom: 10px; }

/* ── Loading overlay ─────────────────────────────────────────────── */
#loading {
  position: fixed; inset: 0;
  background: rgba(255,255,255,0.92);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 2000;
  gap: 12px;
  font-size: 14px; color: #666;
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid #e0e3ec;
  border-top-color: #1a1f2e;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (min-width: 600px) {
  #detail { max-width: 440px; left: auto; right: 20px; bottom: 20px; border-radius: 16px; }
  #save-overlay { align-items: center; }
  #save-modal { border-radius: 20px; margin: 20px; }
}
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="header-left">
      <div id="header-title">Geo Memory</div>
      <div id="count">Loading…</div>
    </div>
    <div id="mode-toggle">
      <button class="mode-btn active" data-mode="myplaces" onclick="switchMode('myplaces')">My Places</button>
      <button class="mode-btn" data-mode="discover" onclick="switchMode('discover')">Discover</button>
    </div>
  </div>

  <div id="myplaces-ui">
    <div id="search-row">
      <input id="search-input" type="search" placeholder="Search my places…" autocomplete="off" />
      <div id="search-results"></div>
    </div>
    <div id="filters">
      <div class="filter-row">
        <span class="filter-label">Status</span>
        <button class="status-btn active" data-status="all">All</button>
        <button class="status-btn" data-status="Visited">Visited</button>
        <button class="status-btn" data-status="Want to Visit">Want to Visit</button>
      </div>
      <div class="filter-row" id="cat-row">
        <span class="filter-label">Category</span>
      </div>
    </div>
  </div>

  <div id="discover-ui">
    <div id="discover-row">
      <input id="discover-input" type="search" placeholder="e.g. ramen in Tokyo, bars in Chicago" autocomplete="off" />
      <button id="discover-btn" onclick="runDiscover()">Search</button>
    </div>
    <div id="discover-hint">Searches Google Places · tap any result to save it to Notion</div>
  </div>

  <div id="map"></div>
  <div id="discover-results"></div>

</div>

<div id="detail">
  <button id="detail-close" onclick="closeDetail()">✕</button>
  <div id="detail-name"></div>
  <div id="detail-meta"></div>
  <div id="detail-body"></div>
</div>

<div id="save-overlay" onclick="handleOverlayClick(event)">
  <div id="save-modal">
    <div id="save-modal-title">Save to Notion</div>
    <div id="save-modal-name"></div>
    <div id="save-modal-addr"></div>

    <div class="save-field-label">Status</div>
    <div class="status-picker">
      <button class="status-pick-btn active-want" id="pick-want" onclick="pickStatus('Want to Visit')">Want to Visit</button>
      <button class="status-pick-btn" id="pick-visited" onclick="pickStatus('Visited')">Visited</button>
    </div>

    <div class="save-field-label">Note <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#bbb">(optional)</span></div>
    <textarea id="save-note" class="save-textarea" placeholder="What do you want to remember about this place?"></textarea>

    <div class="save-field-label">Tags <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#bbb">(optional, comma-separated)</span></div>
    <input id="save-tags" class="save-input" type="text" placeholder="e.g. date night, Italian, client dinner" />

    <div class="save-actions">
      <button id="save-cancel" onclick="closeSaveModal()">Cancel</button>
      <button id="save-submit" onclick="submitSave()">Save to Notion</button>
    </div>
    <div id="save-status-msg"></div>
  </div>
</div>

<div id="checkin-overlay" onclick="handleCheckInOverlayClick(event)">
  <div id="checkin-modal">
    <div id="checkin-modal-title">Check In</div>
    <div id="checkin-modal-name"></div>

    <div class="save-field-label">Date</div>
    <input id="checkin-date" type="date" class="save-input" />

    <div class="save-field-label">Occasion</div>
    <div class="occasion-picker">
      <button class="occasion-btn active" id="occ-solo"          onclick="pickOccasion('Solo')">Solo</button>
      <button class="occasion-btn"        id="occ-date"          onclick="pickOccasion('Date/Partner')">Date/Partner</button>
      <button class="occasion-btn"        id="occ-friends"       onclick="pickOccasion('Friends')">Friends</button>
      <button class="occasion-btn"        id="occ-family"        onclick="pickOccasion('Family')">Family</button>
      <button class="occasion-btn"        id="occ-client"        onclick="pickOccasion('Client/Work')">Client/Work</button>
    </div>

    <div class="save-field-label">How was it?</div>
    <div class="sentiment-picker">
      <button class="sentiment-btn active-good" id="pick-good" onclick="pickSentiment('Good')">👍 Good</button>
      <button class="sentiment-btn"             id="pick-bad"  onclick="pickSentiment('Bad')">👎 Bad</button>
    </div>

    <div class="save-field-label">Who were you with? <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#bbb">(optional)</span></div>
    <input id="checkin-companions" class="save-input" type="text" placeholder="e.g. Sarah, the team…" style="margin-bottom:20px" />

    <div class="save-field-label">Notes <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#bbb">(optional)</span></div>

</div>

<div id="loading">
  <div class="spinner"></div>
  <div>Loading your places…</div>
</div>

<script>
const GOOGLE_API_KEY = 'AIzaSyCEoi34yEEg9Ka7BtDJMJm9iRTM46CodN8';
const WORKER_URL     = 'https://geo-memory-save.weissdavid01.workers.dev';

const CATEGORY_COLORS = {

const GOOGLE_TYPE_MAP = {

  botanical_garden: 'Attraction', historic_site: 'Attraction',

  movie_theater: 'Attraction', bowling_alley: 'Attraction',

function googleTypeToCategory(t) { return GOOGLE_TYPE_MAP[t] || 'Other'; }

let allPlaces = [], myPlacesByGoogleId = new Map();
let myPlacesMarkers = [], discoverMarkers = [];
let currentMode = 'myplaces', activeStatus = 'all';
let activeCategories = new Set(Object.keys(CATEGORY_COLORS));
let _discoverPlaces = [], _discoverMyPlaces = [];
let _saveIndex = -1, _saveStatus = 'Want to Visit';
let _checkInNotionId = null, _checkInPlaceName = '';
let _checkInOccasion = 'Solo', _checkInSentiment = 'Good';

const map = L.map('map', { zoomControl: true }).setView([39.5, -95.0], 4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19,
}).addTo(map);
map.on('click', closeDetail);

fetch('places.json')
  .then(r => r.json())
  .then(data => {
    allPlaces = data;
    for (const p of allPlaces) {
      if (p.google_place_id) myPlacesByGoogleId.set(p.google_place_id, p);
    }
    document.getElementById('loading').style.display = 'none';
    buildCategoryFilters();
    buildMyPlacesMarkers();
    applyFilters();
  })
  .catch(err => {
    document.getElementById('loading').innerHTML =
      `<div style="color:#c00;text-align:center;padding:24px">Failed to load places.<br><small>${err.message}</small></div>`;
  });

function buildCategoryFilters() {
  const counts = {};
  for (const p of allPlaces) counts[p.category] = (counts[p.category] || 0) + 1;
  const row = document.getElementById('cat-row');
  for (const [cat, color] of Object.entries(CATEGORY_COLORS)) {
    if (!counts[cat]) continue;
    const chip = document.createElement('button');
    chip.className = 'cat-chip';
    chip.dataset.cat = cat;
    chip.innerHTML = `<span class="cat-dot" style="background:${color}"></span>${cat} <span style="color:#bbb;font-size:11px">(${counts[cat]})</span>`;
    chip.addEventListener('click', () => {
      if (activeCategories.has(cat)) activeCategories.delete(cat);
      else activeCategories.add(cat);
      chip.classList.toggle('off', !activeCategories.has(cat));
      applyFilters();
    });
    row.appendChild(chip);
  }
}

function buildMyPlacesMarkers() {
  for (const p of allPlaces) {
    if (p.lat == null || p.lng == null) continue;
    const color = CATEGORY_COLORS[p.category] || '#909090';
    const m = L.circleMarker([p.lat, p.lng], {
      radius: 7, fillColor: color, color: '#fff', weight: 1.5,
      fillOpacity: p.status === 'Visited' ? 0.92 : 0.45, opacity: 1,
    });
    m.on('click', e => { L.DomEvent.stopPropagation(e); showMyPlaceDetail(p); });
    myPlacesMarkers.push({ marker: m, place: p });
  }
}

function applyFilters() {
  let shown = 0;
  for (const { marker, place } of myPlacesMarkers) {
    const ok = (activeStatus === 'all' || place.status === activeStatus) && activeCategories.has(place.category);
    if (ok) { marker.addTo(map); shown++; } else { marker.remove(); }
  }
  document.getElementById('count').textContent = `${shown} of ${allPlaces.filter(p => p.lat != null).length} places`;
}

document.querySelectorAll('.status-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeStatus = btn.dataset.status;
    applyFilters();
  });
});

const searchInput = document.getElementById('search-input');
const searchResultsEl = document.getElementById('search-results');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  searchResultsEl.innerHTML = '';
  if (!q) { searchResultsEl.style.display = 'none'; return; }
  const matches = allPlaces.filter(p => p.name && p.name.toLowerCase().includes(q)).slice(0, 8);
  if (!matches.length) { searchResultsEl.style.display = 'none'; return; }
  for (const p of matches) {
    const div = document.createElement('div');
    div.className = 'search-result-item';
    div.innerHTML = `<span class="sri-name">${esc(p.name)}</span><span class="sri-meta">${esc([p.category, p.city].filter(Boolean).join(' · '))}</span>`;
    div.addEventListener('mousedown', e => { e.preventDefault(); });
    div.addEventListener('click', () => {
      searchResultsEl.style.display = 'none'; searchInput.value = ''; searchInput.blur();
      if (p.lat != null) map.setView([p.lat, p.lng], 14, { animate: true });
      showMyPlaceDetail(p);
    });
    searchResultsEl.appendChild(div);
  }
  searchResultsEl.style.display = 'block';
});
searchInput.addEventListener('blur', () => { setTimeout(() => { searchResultsEl.style.display = 'none'; }, 300); });

function switchMode(mode) {
  currentMode = mode; closeDetail();
  document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode));
  const myUI = document.getElementById('myplaces-ui');
  const discoverUI = document.getElementById('discover-ui');
  const resultsEl = document.getElementById('discover-results');
  const mapEl = document.getElementById('map');
  if (mode === 'myplaces') {
    myUI.style.display = ''; discoverUI.style.display = 'none'; resultsEl.style.display = 'none';
    mapEl.style.flex = '1'; mapEl.style.height = '';
    clearDiscoverMarkers(); applyFilters();
  } else {
    myUI.style.display = 'none'; discoverUI.style.display = 'block';
    mapEl.style.flex = ''; mapEl.style.height = '38vh';
    for (const { marker } of myPlacesMarkers) marker.remove();
    document.getElementById('count').textContent = 'Google Places search';
    setTimeout(() => document.getElementById('discover-input').focus(), 100);
  }
  requestAnimationFrame(() => { requestAnimationFrame(() => { map.invalidateSize(false); }); });
}

async function runDiscover() {
  const query = document.getElementById('discover-input').value.trim();
  if (!query) return;
  document.getElementById('discover-input').blur();
  const resultsEl = document.getElementById('discover-results');
  resultsEl.style.display = 'block';
  resultsEl.innerHTML = '<div id="discover-loading"><div class="spinner"></div></div>';
  document.getElementById('count').textContent = 'Searching…';
  clearDiscoverMarkers();
  try {
    const resp = await fetch('https://places.googleapis.com/v1/places:searchText', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json', 'X-Goog-Api-Key': GOOGLE_API_KEY,
        'X-Goog-FieldMask': 'places.id,places.displayName,places.formattedAddress,places.location,places.rating,places.primaryType,places.addressComponents,places.googleMapsUri',
      },
      body: JSON.stringify({ textQuery: query, maxResultCount: 20 }),
    });
    if (!resp.ok) { const e = await resp.json().catch(() => ({})); throw new Error(e.error?.message || `API error ${resp.status}`); }
    const data = await resp.json();
    renderDiscoverResults(data.places || [], query);
  } catch (e) {
    resultsEl.innerHTML = `<div id="discover-empty">Search failed: ${esc(e.message)}</div>`;
    document.getElementById('count').textContent = 'Error';
  }
}

document.getElementById('discover-input').addEventListener('keydown', e => { if (e.key === 'Enter') runDiscover(); });

function renderDiscoverResults(places, query) {
  const resultsEl = document.getElementById('discover-results');
  if (!places.length) {
    resultsEl.innerHTML = `<div id="discover-empty">No results for "<strong>${esc(query)}</strong>".</div>`;
    document.getElementById('count').textContent = '0 results'; return;
  }
  _discoverPlaces = places;
  _discoverMyPlaces = places.map(gp => myPlacesByGoogleId.get(gp.id) || null);
  let matchCount = 0;
  const bounds = [], matched = [], unmatched = [];
  places.forEach((gp, i) => {
    const lat = gp.location?.latitude, lng = gp.location?.longitude;
    const name = gp.displayName?.text || 'Unknown';
    const myPlace = _discoverMyPlaces[i];
    if (myPlace) matchCount++;
    const pinColor = myPlace ? '#f5c518' : '#8899aa';
    const pinBorder = myPlace ? '#b8960a' : '#fff';
    if (lat != null && lng != null) {
      bounds.push([lat, lng]);
      const m = L.circleMarker([lat, lng], {
        radius: myPlace ? 11 : 9, fillColor: pinColor, color: pinBorder,
        weight: myPlace ? 2.5 : 1.5, fillOpacity: 0.88, opacity: 1,
      });
      m.on('click', e => { L.DomEvent.stopPropagation(e); showDiscoverDetail(i); });
      m.addTo(map); discoverMarkers.push(m);
    }
    const card = { matched: !!myPlace, html: `
      <div class="discover-card${myPlace ? ' matched' : ''}" onclick="showDiscoverDetail(${i})">
        <div class="dc-dot-wrap"><div class="dc-dot" style="background:${pinColor}"></div></div>
        <div class="dc-body">
          <div class="dc-name">${esc(name)}</div>
          <div class="dc-addr">${esc(gp.formattedAddress || '')}</div>
          ${myPlace ? `<div class="dc-badge">★ In your list</div>` : ''}
        </div>
        <div class="dc-right">${gp.rating ? `<div class="dc-grating">${gp.rating.toFixed(1)}</div><div class="dc-grating-lbl">Google</div>` : ''}</div>
      </div>` };
    if (myPlace) matched.push(card); else unmatched.push(card);
  });
  resultsEl.innerHTML = [...matched, ...unmatched].map(c => c.html).join('');
  const matchLabel = matchCount > 0 ? ` · <strong style="color:#c48f00">${matchCount} in your list</strong>` : '';
  document.getElementById('count').innerHTML = `${places.length} results${matchLabel}`;
  if (bounds.length) map.fitBounds(bounds, { padding: [20, 20], maxZoom: 14, animate: true });
}

function clearDiscoverMarkers() { for (const m of discoverMarkers) m.remove(); discoverMarkers = []; }

function switchDetailTab(tab) {
  document.querySelectorAll('.detail-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.detail-tab-panel').forEach(p => p.classList.toggle('active', p.dataset.panel === tab));
}

function showMyPlaceDetail(p) {
  document.getElementById('detail-name').textContent = p.name;
  document.getElementById('detail-meta').textContent = [p.category, p.city, p.country].filter(Boolean).join(' · ');

  // ── Tab bar ───────────────────────────────────────────────────────
  let html = `<div class="detail-tabs">
    <button class="detail-tab active" data-tab="overview" onclick="switchDetailTab('overview')">Overview</button>
    <button class="detail-tab" data-tab="info" onclick="switchDetailTab('info')">Info</button>
    <button class="detail-tab" data-tab="visits" onclick="switchDetailTab('visits')">Visits</button>
  </div>`;

  // ── Overview panel ────────────────────────────────────────────────
  const sc = p.status === 'Visited' ? 'pill-visited' : 'pill-want';
  let overview = `<div class="detail-row"><span class="detail-key">Status</span><span class="detail-val"><span class="pill ${sc}">${esc(p.status || '—')}</span></span></div>`;
  if (p.rating) { const s = '★'.repeat(Math.round(p.rating)) + '☆'.repeat(5 - Math.round(p.rating)); overview += `<div class="detail-row"><span class="detail-key">My rating</span><span class="detail-val">${s} ${p.rating}</span></div>`; }
  if (p.ai_summary) overview += `<div class="detail-row"><span class="detail-key">Summary</span><span class="detail-val">${esc(p.ai_summary)}</span></div>`;
  if (p.notes) overview += `<div class="detail-row"><span class="detail-key">Notes</span><span class="detail-val">${esc(p.notes)}</span></div>`;
  if (p.tags && p.tags.length) overview += `<div class="detail-row"><span class="detail-key">Tags</span><span class="detail-val">${p.tags.map(esc).join(', ')}</span></div>`;
  if (p.visit_count) {
    const last = p.last_visited ? ' · Last: ' + p.last_visited : '';
    overview += `<div class="detail-row"><span class="detail-key">Visits</span><span class="detail-val" style="color:#3daa6e;font-weight:600">${p.visit_count} visit${p.visit_count !== 1 ? 's' : ''}${esc(last)}</span></div>`;
  }
  html += `<div class="detail-tab-panel active" data-panel="overview">${overview}</div>`;

  // ── Info panel (stub — tomorrow) ──────────────────────────────────
  html += `<div class="detail-tab-panel" data-panel="info"><div class="detail-stub">Phone, hours &amp; website — coming soon</div></div>`;

  // ── Visits panel (stub — tomorrow) ───────────────────────────────
  html += `<div class="detail-tab-panel" data-panel="visits"><div class="detail-stub">Visit history — coming soon</div></div>`;

  // ── Action buttons (always visible, outside tabs) ─────────────────
  html += `<div class="detail-actions">`;
  if (p.lat != null) html += `<a href="https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}&travelmode=driving" target="_blank" class="btn-action btn-primary">Directions</a>`;
  if (p.notion_id) html += `<button class="btn-action btn-checkin" onclick="openCheckInModal('${esc(p.notion_id)}','${esc(p.name)}')">Check In</button>`;
  if (p.notion_id) html += `<a href="https://www.notion.so/${p.notion_id}" target="_blank" class="btn-action btn-secondary">Open in Notion</a>`;
  html += `</div>`;

  document.getElementById('detail-body').innerHTML = html;
  document.getElementById('detail').classList.add('open');
}

function showDiscoverDetail(i) {
  const gp = _discoverPlaces[i], myPlace = _discoverMyPlaces[i];
  if (!gp) return;
  const name = gp.displayName?.text || 'Unknown';
  const category = googleTypeToCategory(gp.primaryType);
  const lat = gp.location?.latitude, lng = gp.location?.longitude;
  document.getElementById('detail-name').textContent = name;
  document.getElementById('detail-meta').textContent = gp.formattedAddress || '';
  let html = `<div class="detail-row"><span class="detail-key">Type</span><span class="detail-val">${esc(category)}</span></div>`;
  if (gp.rating) { const s = '★'.repeat(Math.round(gp.rating)) + '☆'.repeat(5 - Math.round(gp.rating)); html += `<div class="detail-row"><span class="detail-key">Google</span><span class="detail-val">${s} ${gp.rating.toFixed(1)}</span></div>`; }
  if (myPlace) {
    const sc = myPlace.status === 'Visited' ? 'pill-visited' : 'pill-want';
    html += `<div class="in-list-box" style="margin-top:12px"><div class="in-list-label">★ In your list</div>`;
    html += `<div class="detail-row"><span class="detail-key">Status</span><span class="detail-val"><span class="pill ${sc}">${esc(myPlace.status || '—')}</span></span></div>`;
    if (myPlace.rating) { const s = '★'.repeat(Math.round(myPlace.rating)) + '☆'.repeat(5 - Math.round(myPlace.rating)); html += `<div class="detail-row"><span class="detail-key">My rating</span><span class="detail-val">${s} ${myPlace.rating}</span></div>`; }
    if (myPlace.notes) html += `<div class="detail-row"><span class="detail-key">Notes</span><span class="detail-val">${esc(myPlace.notes)}</span></div>`;
    html += `</div>`;
  }
  html += `<div class="detail-actions">`;
  if (lat != null) html += `<a href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&destination_place_id=${esc(gp.id)}&travelmode=driving" target="_blank" class="btn-action btn-primary">Directions</a>`;
  if (myPlace && myPlace.notion_id) html += `<a href="https://www.notion.so/${myPlace.notion_id}" target="_blank" class="btn-action btn-secondary">Open in Notion</a>`;
  if (!myPlace) html += `<button class="btn-action btn-save" onclick="openSaveModal(${i})">+ Save to Notion</button>`;
  html += `</div>`;
  document.getElementById('detail-body').innerHTML = html;
  document.getElementById('detail').classList.add('open');
  if (lat != null && lng != null) {
    const zoom = 15, sheetH = window.innerHeight * 0.42;
    const pt = map.project([lat, lng], zoom);
    map.setView(map.unproject([pt.x, pt.y + sheetH / 2], zoom), zoom, { animate: true });
  }
}

function openSaveModal(i) {
  const gp = _discoverPlaces[i]; if (!gp) return;
  _saveIndex = i; _saveStatus = 'Want to Visit';
  document.getElementById('save-modal-name').textContent = gp.displayName?.text || 'Unknown';
  document.getElementById('save-modal-addr').textContent = gp.formattedAddress || '';
  document.getElementById('save-note').value = '';
  document.getElementById('save-tags').value = '';
  document.getElementById('save-status-msg').textContent = '';
  document.getElementById('save-submit').disabled = false;
  document.getElementById('save-submit').textContent = 'Save to Notion';
  document.getElementById('save-submit').style.background = '';
  document.getElementById('pick-want').className = 'status-pick-btn active-want';
  document.getElementById('pick-visited').className = 'status-pick-btn';
  document.getElementById('save-overlay').classList.add('open');
  setTimeout(() => document.getElementById('save-note').focus(), 200);
}

function pickStatus(val) {
  _saveStatus = val;
  document.getElementById('pick-want').className = val === 'Want to Visit' ? 'status-pick-btn active-want' : 'status-pick-btn';
  document.getElementById('pick-visited').className = val === 'Visited' ? 'status-pick-btn active-visited' : 'status-pick-btn';
}

function closeSaveModal() { document.getElementById('save-overlay').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target === document.getElementById('save-overlay')) closeSaveModal(); }

async function submitSave() {
  const gp = _discoverPlaces[_saveIndex]; if (!gp) return;
  const btn = document.getElementById('save-submit');
  btn.disabled = true; btn.textContent = 'Saving…';
  document.getElementById('save-status-msg').textContent = '';
  let city = '', country = '', neighborhood = '';
  for (const comp of (gp.addressComponents || [])) {
    const types = comp.types || [];
    if (types.includes('locality')) city = comp.longText || '';
    else if (types.includes('country')) country = comp.longText || '';
    else if (types.includes('neighborhood') || types.includes('sublocality_level_1')) neighborhood = comp.longText || '';
  }
  const rawTags = document.getElementById('save-tags').value.trim();
  const tags = rawTags ? rawTags.split(',').map(t => t.trim()).filter(Boolean) : [];
  const payload = {
    name: gp.displayName?.text || 'Unknown', status: _saveStatus,
    notes: document.getElementById('save-note').value.trim(), tags,
    google_place_id: gp.id, lat: gp.location?.latitude ?? null, lng: gp.location?.longitude ?? null,
    address: gp.formattedAddress || '', city, country, neighborhood,
    category: googleTypeToCategory(gp.primaryType),
    google_maps_url: gp.googleMapsUri || '', rating_external: gp.rating ?? null,
  };
  try {
    const resp = await fetch(WORKER_URL + '/save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    const result = await resp.json();
    if (result.ok) {
      btn.textContent = 'Saved!'; btn.style.background = '#2e7d32';
      document.getElementById('save-status-msg').textContent = 'Added to Notion. Will appear on the map after the nightly sync.';
      document.getElementById('save-status-msg').style.color = '#2e7d32';
      setTimeout(closeSaveModal, 2200);
    } else { throw new Error(result.error || 'Unknown error'); }
  } catch (e) {
    btn.disabled = false; btn.textContent = 'Save to Notion';
    document.getElementById('save-status-msg').textContent = 'Save failed: ' + e.message;
    document.getElementById('save-status-msg').style.color = '#c00';
  }
}

// ── Check-in functions ────────────────────────────────────────────────────────

function openCheckInModal(notionId, placeName) {
  _checkInNotionId = notionId;
  _checkInPlaceName = placeName;
  _checkInOccasion = 'Solo';
  _checkInSentiment = 'Good';
  document.getElementById('checkin-modal-name').textContent = placeName;
  // Set date to today in local time (not UTC)
  const now = new Date();
  const today = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  document.getElementById('checkin-date').value = today;
  document.getElementById('checkin-notes').value = '';
  document.getElementById('checkin-companions').value = '';
  document.getElementById('checkin-status-msg').textContent = '';
  document.getElementById('checkin-submit').disabled = false;
  document.getElementById('checkin-submit').textContent = 'Check In';
  document.getElementById('checkin-submit').style.background = '';
  // Reset occasion buttons
  ['solo','date','friends','family','client'].forEach(id => {
    document.getElementById('occ-' + id).classList.remove('active');
  });
  document.getElementById('occ-solo').classList.add('active');
  // Reset sentiment
  document.getElementById('pick-good').className = 'sentiment-btn active-good';
  document.getElementById('pick-bad').className = 'sentiment-btn';
  document.getElementById('checkin-overlay').classList.add('open');
  setTimeout(() => document.getElementById('checkin-notes').focus(), 200);
}

function pickOccasion(val) {
  _checkInOccasion = val;
  const map = { 'Solo':'solo', 'Date/Partner':'date', 'Friends':'friends', 'Family':'family', 'Client/Work':'client' };
  Object.values(map).forEach(id => document.getElementById('occ-' + id).classList.remove('active'));
  document.getElementById('occ-' + map[val]).classList.add('active');
}

function pickSentiment(val) {
  _checkInSentiment = val;
  document.getElementById('pick-good').className = val === 'Good' ? 'sentiment-btn active-good' : 'sentiment-btn';
  document.getElementById('pick-bad').className  = val === 'Bad'  ? 'sentiment-btn active-bad'  : 'sentiment-btn';
}

function closeCheckInModal() { document.getElementById('checkin-overlay').classList.remove('open'); }
function handleCheckInOverlayClick(e) { if (e.target === document.getElementById('checkin-overlay')) closeCheckInModal(); }

async function submitCheckIn() {
  if (!_checkInNotionId) return;
  const btn = document.getElementById('checkin-submit');
  btn.disabled = true; btn.textContent = 'Saving…';
  document.getElementById('checkin-status-msg').textContent = '';
  const payload = {
    notion_id:   _checkInNotionId,
    place_name:  _checkInPlaceName,
    date:        document.getElementById('checkin-date').value,
    occasion:    _checkInOccasion,
    sentiment:   _checkInSentiment,
    companions:  document.getElementById('checkin-companions').value.trim(),
    notes:       document.getElementById('checkin-notes').value.trim(),
  };
  try {
    const resp = await fetch(WORKER_URL + '/check-in', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
    });
    const result = await resp.json();
    if (result.ok) {
      btn.textContent = 'Checked In!'; btn.style.background = '#1565c0';
      document.getElementById('checkin-status-msg').textContent = 'Visit saved to Notion.';
      document.getElementById('checkin-status-msg').style.color = '#1565c0';
      setTimeout(closeCheckInModal, 1800);
    } else { throw new Error(result.error || 'Unknown error'); }
  } catch (e) {
    btn.disabled = false; btn.textContent = 'Check In';
    document.getElementById('checkin-status-msg').textContent = 'Failed: ' + e.message;
    document.getElementById('checkin-status-msg').style.color = '#c00';
  }
}

function closeDetail() { document.getElementById('detail').classList.remove('open'); }
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
